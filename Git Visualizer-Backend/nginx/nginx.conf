worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # Load-balance across the two backend replicas.
    # least_conn sends each request to the replica with the fewest active
    # connections (falls back to round-robin under equal load).
    upstream gitviz_backend {
        least_conn;
        server backend-1:8080;
        server backend-2:8080;
    }

    server {
        listen 8080;

        location / {
            proxy_pass http://gitviz_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }
    }
}
