services:
  postgres:
    image: postgres:17.5-alpine
    environment:
      POSTGRES_DB: gitviz
      POSTGRES_USER: gitviz
      POSTGRES_PASSWORD: ${DB_PASSWORD:-gitviz}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gitviz -d gitviz"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend-1: &backend
    build: .
    environment: &backend-env
      SPRING_PROFILES_ACTIVE: docker
      DB_URL: jdbc:postgresql://postgres:5432/gitviz
      DB_USERNAME: gitviz
      DB_PASSWORD: ${DB_PASSWORD:-gitviz}
      REDIS_HOST: redis
      RATELIMIT_BACKEND: redis
      RATELIMIT_CAPACITY: ${RATELIMIT_CAPACITY:-120}
      RATELIMIT_REFILL_TOKENS: ${RATELIMIT_REFILL_TOKENS:-120}
      RATELIMIT_REFILL_PERIOD_SECONDS: ${RATELIMIT_REFILL_PERIOD_SECONDS:-60}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Health endpoint exposed for the orchestrator and manual curl checks
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    ports:
      - "8081:8080"

  backend-2:
    <<: *backend
    # Waits for backend-1 so the two replicas don't race on first-boot schema
    # creation and seeding against the shared fresh database.
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend-1:
        condition: service_healthy
    ports:
      - "8082:8080"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8080:8080"
    depends_on:
      backend-1:
        condition: service_healthy
      backend-2:
        condition: service_healthy

volumes:
  pgdata:
